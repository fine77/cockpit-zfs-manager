<!doctype html>
<html>
<head>

  <title>Cockpit NFS Module</title>

  <script src="nfs.js"></script>
  <link rel="stylesheet" href="nfs.css">
</head>
<body>
  <main class="nfs-page">
    <h1>NFS Module (Foundation)</h1>
    <h2>NFs Export State Load</h2>

          </tr>
        </tbody>
      </table>
    </div>
  </main>
